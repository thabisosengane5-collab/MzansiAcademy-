<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUBS // FOUNDER DASHBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --surface: #0d1117;
    --surface2: #131920;
    --border: #1e2a35;
    --border-bright: #2a3f50;
    --text: #c8d8e8;
    --muted: #4a6070;
    --accent-mz: #00e5a0;
    --accent-pu: #5b8cff;
    --accent-tr: #ffb830;
    --danger: #ff4455;
    --warn: #ff9500;
    --mono: 'Space Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID NOISE BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .dashboard { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 20px; }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .header-left h1 {
    font-family: var(--display);
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    letter-spacing: 4px;
    line-height: 1;
    color: #fff;
  }
  .header-left h1 span { color: var(--accent-mz); }
  .header-sub {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 6px;
  }
  .header-right { text-align: right; }
  .sync-time {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .sync-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sync-btn:hover { border-color: var(--accent-mz); color: var(--accent-mz); }
  .sync-btn.spinning .icon { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* CONFIG BANNER */
  .config-banner {
    background: #1a0a00;
    border: 1px solid var(--warn);
    padding: 16px 20px;
    margin-bottom: 24px;
    display: none;
  }
  .config-banner.show { display: block; }
  .config-banner h3 { font-family: var(--mono); font-size: 0.75rem; color: var(--warn); letter-spacing: 2px; margin-bottom: 12px; }
  .config-fields { display: flex; gap: 12px; flex-wrap: wrap; }
  .config-fields input {
    flex: 1;
    min-width: 200px;
    background: #0d0800;
    border: 1px solid #3a2200;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 8px 12px;
    letter-spacing: 1px;
  }
  .config-fields input:focus { outline: none; border-color: var(--warn); }
  .config-fields button {
    padding: 8px 20px;
    background: var(--warn);
    border: none;
    color: #000;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
  }

  /* ERROR BANNER */
  .error-banner {
    background: #1a0008;
    border: 1px solid var(--danger);
    padding: 12px 20px;
    margin-bottom: 20px;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--danger);
    letter-spacing: 1px;
    display: none;
  }
  .error-banner.show { display: block; }

  /* COMMAND BAR — daily stats */
  .command-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .cmd-stat {
    background: var(--surface);
    padding: 16px 20px;
    text-align: center;
  }
  .cmd-stat .val {
    font-family: var(--display);
    font-size: 2.2rem;
    letter-spacing: 2px;
    line-height: 1;
    color: #fff;
  }
  .cmd-stat .val.green { color: var(--accent-mz); }
  .cmd-stat .val.red { color: var(--danger); }
  .cmd-stat .val.yellow { color: var(--accent-tr); }
  .cmd-stat .label {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* PROJECT GRID */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .project-card:hover { border-color: var(--border-bright); }
  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .project-card.mz::before { background: var(--accent-mz); }
  .project-card.pu::before { background: var(--accent-pu); }
  .project-card.tr::before { background: var(--accent-tr); }

  .project-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .project-name {
    font-family: var(--display);
    font-size: 1.6rem;
    letter-spacing: 3px;
    line-height: 1;
  }
  .project-card.mz .project-name { color: var(--accent-mz); }
  .project-card.pu .project-name { color: var(--accent-pu); }
  .project-card.tr .project-name { color: var(--accent-tr); }
  .project-tag {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 4px;
  }
  .project-status {
    font-family: var(--mono);
    font-size: 0.6rem;
    padding: 4px 8px;
    letter-spacing: 1px;
    border: 1px solid currentColor;
  }
  .status-active { color: var(--accent-mz); }
  .status-blocked { color: var(--danger); }
  .status-building { color: var(--accent-tr); }

  /* PROGRESS */
  .progress-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .progress-label span:last-child { color: var(--text); }
  .progress-track {
    height: 4px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .project-card.mz .progress-fill { background: var(--accent-mz); }
  .project-card.pu .progress-fill { background: var(--accent-pu); }
  .project-card.tr .progress-fill { background: var(--accent-tr); }

  /* TASK BREAKDOWN */
  .task-breakdown {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .task-col { text-align: center; }
  .task-col .count {
    font-family: var(--display);
    font-size: 1.4rem;
    line-height: 1;
  }
  .task-col .col-label {
    font-family: var(--mono);
    font-size: 0.52rem;
    letter-spacing: 1px;
    color: var(--muted);
    margin-top: 3px;
  }
  .col-backlog .count { color: var(--muted); }
  .col-week .count { color: var(--accent-tr); }
  .col-progress .count { color: #fff; }
  .col-blocked .count { color: var(--danger); }
  .col-done .count { color: var(--accent-mz); }

  /* MILESTONE */
  .milestone-section { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .milestone-header {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .milestone-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
  }
  .milestone-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .milestone-dot.done { background: var(--accent-mz); }
  .milestone-dot.active { background: var(--accent-tr); box-shadow: 0 0 6px var(--accent-tr); }
  .milestone-dot.pending { background: var(--border-bright); }
  .milestone-text {
    font-size: 0.75rem;
    flex: 1;
    line-height: 1.3;
  }
  .milestone-text.done { color: var(--muted); text-decoration: line-through; }
  .milestone-text.active { color: var(--text); }
  .milestone-text.pending { color: var(--muted); }
  .milestone-eta {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* ACTIVE TASKS LIST */
  .tasks-section { padding: 14px 20px; }
  .tasks-header {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
    line-height: 1.3;
  }
  .task-item:last-child { border-bottom: none; }
  .task-pill {
    font-family: var(--mono);
    font-size: 0.52rem;
    padding: 2px 6px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 1px;
    letter-spacing: 0.5px;
  }
  .pill-week { background: rgba(255,184,48,0.15); color: var(--accent-tr); }
  .pill-progress { background: rgba(255,255,255,0.08); color: var(--text); }
  .pill-blocked { background: rgba(255,68,85,0.15); color: var(--danger); }
  .task-name { flex: 1; }
  .no-tasks {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    padding: 10px 0;
    font-style: italic;
  }

  /* SCHEDULE */
  .schedule-section {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .section-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-title {
    font-family: var(--display);
    font-size: 1.3rem;
    letter-spacing: 3px;
    color: #fff;
  }
  .section-meta {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .schedule-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
  }
  .day-col {
    background: var(--surface);
    padding: 16px;
  }
  .day-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .day-label.today { color: var(--accent-mz); }
  .schedule-task {
    padding: 7px 10px;
    margin-bottom: 6px;
    border-left: 2px solid;
    font-size: 0.72rem;
    line-height: 1.4;
    background: var(--surface2);
  }
  .schedule-task.mz { border-color: var(--accent-mz); }
  .schedule-task.pu { border-color: var(--accent-pu); }
  .schedule-task.tr { border-color: var(--accent-tr); }
  .schedule-task .proj-tag {
    font-family: var(--mono);
    font-size: 0.52rem;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .schedule-task.mz .proj-tag { color: var(--accent-mz); opacity: 0.7; }
  .schedule-task.pu .proj-tag { color: var(--accent-pu); opacity: 0.7; }
  .schedule-task.tr .proj-tag { color: var(--accent-tr); opacity: 0.7; }

  /* ANALYST NOTE */
  .analyst-section {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .analyst-body { padding: 20px; }
  .analyst-line {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    line-height: 1.5;
  }
  .analyst-line:last-child { border-bottom: none; }
  .analyst-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }
  .analyst-line.warn { color: var(--warn); }
  .analyst-line.good { color: var(--accent-mz); }
  .analyst-line.info { color: var(--text); }
  .analyst-line.alert { color: var(--danger); }

  /* FOOTER */
  .footer {
    padding: 16px 0;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-text {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* LOADING STATE */
  .loading-overlay {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }
  .loading-overlay.show { display: block; }
  .loader {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent-mz);
    letter-spacing: 3px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* ENTRY ANIMATION */
  .project-card, .schedule-section, .analyst-section {
    animation: fadeUp 0.4s ease both;
  }
  .project-card:nth-child(2) { animation-delay: 0.1s; }
  .project-card:nth-child(3) { animation-delay: 0.2s; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to { opacity:1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .projects-grid { grid-template-columns: 1fr; }
    .command-bar { grid-template-columns: repeat(2, 1fr); }
    .schedule-grid { grid-template-columns: 1fr; }
    .task-breakdown { grid-template-columns: repeat(5,1fr); gap: 4px; }
  }
</style>
</head>
<body>

<div class="dashboard">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>TUBS <span>//</span> OPS</h1>
      <div class="header-sub">FOUNDER DASHBOARD &nbsp;·&nbsp; DURBAN, ZA &nbsp;·&nbsp; 3 ACTIVE VENTURES</div>
    </div>
    <div class="header-right">
      <div class="sync-time" id="syncTime">NOT SYNCED</div>
      <button class="sync-btn" id="syncBtn" onclick="loadAll()">
        <span class="icon">⟳</span> REFRESH
      </button>
    </div>

  <!-- CONFIG BANNER -->
  <div class="config-banner show" id="configBanner">
    <h3>⚠ TRELLO CREDENTIALS REQUIRED</h3>
    <div class="config-fields">
      <input type="text" id="inputKey" placeholder="TRELLO API KEY" autocomplete="off">
      <input type="text" id="inputToken" placeholder="TRELLO TOKEN" autocomplete="off">
      <button onclick="saveCredentials()">CONNECT</button>
    </div>
  </div>

  <!-- ERROR BANNER -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- COMMAND BAR -->
  <div class="command-bar" id="commandBar">
    <div class="cmd-stat"><div class="val" id="stat-total">—</div><div class="label">TOTAL TASKS</div></div>
    <div class="cmd-stat"><div class="val green" id="stat-done">—</div><div class="label">COMPLETED</div></div>
    <div class="cmd-stat"><div class="val" id="stat-active">—</div><div class="label">IN FLIGHT</div></div>
    <div class="cmd-stat"><div class="val red" id="stat-blocked">—</div><div class="label">BLOCKED</div></div>
    <div class="cmd-stat"><div class="val yellow" id="stat-pct">—</div><div class="label">OVERALL DONE %</div></div>
  </div>

  <!-- PROJECT CARDS -->
  <div class="projects-grid" id="projectsGrid">
    <!-- Injected by JS -->
  </div>

  <!-- WORK SCHEDULE -->
  <div class="schedule-section">
    <div class="section-header">
      <div class="section-title">WEEKLY SCHEDULE</div>
      <div class="section-meta" id="weekLabel">—</div>
    </div>
    <div class="schedule-grid" id="scheduleGrid">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- ANALYST NOTES -->
  <div class="analyst-section">
    <div class="section-header">
      <div class="section-title">ANALYST NOTES</div>
      <div class="section-meta">AUTO-GENERATED</div>
    </div>
    <div class="analyst-body" id="analystBody">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-text">TUBS FOUNDER OS &nbsp;·&nbsp; MZANSIACADEMY · PULSIFY · TRADINGSYSTEM</div>
    <div class="footer-text" id="footerDate">—</div>
  </div>

</div>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
const BOARD_IDS = {
  mz: '69cb010e55ed742dbc28e919', // MzansiAcademy
  tr: '69cb0198f467f3fd08d26c92', // TradingSystem
  pu: '69cb01bdaa70276c08a27d10', // Pulsify
};

const PROJECT_META = {
  mz: {
    name: 'MZANSIACADEMY',
    tag: 'FREE GAMIFIED LEARNING · SA GRADE 8–12 · PWA',
    cls: 'mz',
    status: 'BUILDING',
    statusCls: 'status-building',
    milestones: [

      { text: 'Cloudflare Workers API layer live', weeks: 2 },

    cls: 'pu',
    status: 'ACTIVE',
    statusCls: 'status-active',
    milestones: [
      { text: 'Supabase schema + auth foundation', weeks: 0 },
      { text: 'Event discovery feed (Mapbox integration)', weeks: 1 },
      { text: 'Vibe Feed MVP with AI recommendations (Claude API)', weeks: 3 },
      { text: 'Squad Planning feature complete', weeks: 4 },
      { text: 'Paystack ticketing + payment flow live', weeks: 5 },
      { text: 'Mux live streaming integration', weeks: 7 },
      { text: 'OneSignal push notifications', weeks: 8 },
      { text: 'Closed beta: 50 event organisers', weeks: 10 },
      { text: 'Public launch: Durban → Joburg', weeks: 14 },
    ]
  },
  tr: {
    name: 'TRADINGSYSTEM',
    tag: 'AUTOMATED MQL5 BOT · METATRADER 5',
    cls: 'tr',
    status: 'ACTIVE',
    statusCls: 'status-active',
    milestones: [
      { text: 'Core MQL5 strategy logic coded', weeks: 0 },
      { text: 'Backtesting: 2yr historical data, target >60% winrate', weeks: 1 },
      { text: 'Risk management module (SL, TP, lot sizing)', weeks: 2 },
      { text: 'Forward test on demo account (4 weeks)', weeks: 3 },
      { text: 'Optimisation pass: parameter tuning', weeks: 7 },
      { text: 'Live account deployment (micro lots)', weeks: 9 },
      { text: 'Monitoring dashboard + alerts', weeks: 10 },
      { text: 'Scale to standard lots after 60-day live track record', weeks: 18 },
    ]
  }
};

const LIST_NAMES = {
  backlog: ['backlog'],
  week: ['this week', 'thisweek', 'this_week'],
  progress: ['in progress', 'inprogress', 'in_progress', 'doing'],
  blocked: ['blocked'],
  done: ['done', 'complete', 'completed', 'finished'],
};

const DAYS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

// ─── CREDENTIALS ─────────────────────────────────────────────────────────────
function getKey() { return localStorage.getItem('trello_key') || ''; }
function getToken() { return localStorage.getItem('trello_token') || ''; }

function saveCredentials() {
  const k = document.getElementById('inputKey').value.trim();
  const t = document.getElementById('inputToken').value.trim();
  if (!k || !t) { showError('Both API Key and Token are required.'); return; }
  localStorage.setItem('trello_key', k);
  localStorage.setItem('trello_token', t);
  document.getElementById('configBanner').classList.remove('show');
  loadAll();
}

// ─── TRELLO API ───────────────────────────────────────────────────────────────
async function fetchBoard(boardId) {
  const key = getKey(), token = getToken();
  const url = `https://api.trello.com/1/boards/${boardId}/cards?key=${key}&token=${token}&fields=name,idList,due&lists=open`;
  const listsUrl = `https://api.trello.com/1/boards/${boardId}/lists?key=${key}&token=${token}&fields=name,id`;
  const [cardsRes, listsRes] = await Promise.all([fetch(url), fetch(listsUrl)]);
  if (!cardsRes.ok) throw new Error(`Trello API error ${cardsRes.status}: ${cardsRes.statusText}`);
  const cards = await cardsRes.json();
  const lists = await listsRes.json();
  return { cards, lists };
}

function classifyCards(cards, lists) {
  const listMap = {};
  lists.forEach(l => { listMap[l.id] = l.name.trim().toLowerCase(); });

  const result = { backlog: [], week: [], progress: [], blocked: [], done: [] };

  cards.forEach(card => {
    const ln = listMap[card.idList] || '';
    if (LIST_NAMES.done.some(n => ln.includes(n))) result.done.push(card);
    else if (LIST_NAMES.blocked.some(n => ln.includes(n))) result.blocked.push(card);
    else if (LIST_NAMES.progress.some(n => ln.includes(n))) result.progress.push(card);
    else if (LIST_NAMES.week.some(n => ln.includes(n))) result.week.push(card);
    else result.backlog.push(card);
  });

  return result;
}

// ─── MILESTONES ───────────────────────────────────────────────────────────────
function getMilestoneStatus(milestones, doneCount, totalCount) {
  const pct = totalCount > 0 ? doneCount / totalCount : 0;
  const activeIdx = Math.min(Math.floor(pct * milestones.length), milestones.length - 1);
  return milestones.map((m, i) => ({
    ...m,
    state: i < activeIdx ? 'done' : i === activeIdx ? 'active' : 'pending'
  }));
}

// ─── RENDER PROJECT CARD ──────────────────────────────────────────────────────
function renderProjectCard(key, data, classified) {
  const meta = PROJECT_META[key];
  const total = Object.values(classified).flat().length;
  const done = classified.done.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  const activeTasks = [
    ...classified.progress.map(c => ({ ...c, pill: 'IN PROGRESS', pillCls: 'pill-progress' })),
    ...classified.week.map(c => ({ ...c, pill: 'THIS WEEK', pillCls: 'pill-week' })),
    ...classified.blocked.map(c => ({ ...c, pill: 'BLOCKED', pillCls: 'pill-blocked' })),
  ].slice(0, 6);

  const milestones = getMilestoneStatus(meta.milestones, done, total).slice(0, 5);

  const statusCls = classified.blocked.length > 0 ? 'status-blocked' : meta.statusCls;
  const statusText = classified.blocked.length > 0 ? `${classified.blocked.length} BLOCKED` : meta.status;

  return `
  <div class="project-card ${meta.cls}">
    <div class="project-header">
      <div>
        <div class="project-name">${meta.name}</div>
        <div class="project-tag">${meta.tag}</div>
      </div>
      <div class="project-status ${statusCls}">${statusText}</div>
    </div>

    <div class="progress-section">
      <div class="progress-label">
        <span>COMPLETION</span>
        <span>${done} / ${total} TASKS &nbsp; ${pct}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width: ${pct}%"></div>
      </div>
    </div>

    <div class="task-breakdown">
      <div class="task-col col-backlog">
        <div class="count">${classified.backlog.length}</div>
        <div class="col-label">BACKLOG</div>
      </div>
      <div class="task-col col-week">
        <div class="count">${classified.week.length}</div>
        <div class="col-label">THIS WK</div>
      </div>
      <div class="task-col col-progress">
        <div class="count">${classified.progress.length}</div>
        <div class="col-label">ACTIVE</div>
      </div>
      <div class="task-col col-blocked">
        <div class="count">${classified.blocked.length}</div>
        <div class="col-label">BLOCKED</div>
      </div>
      <div class="task-col col-done">
        <div class="count">${done}</div>
        <div class="col-label">DONE</div>
      </div>
    </div>

    <div class="milestone-section">
      <div class="milestone-header">MILESTONES</div>
      ${milestones.map(m => `
        <div class="milestone-item">
          <div class="milestone-dot ${m.state}"></div>
          <div class="milestone-text ${m.state}">${m.text}</div>
          <div class="milestone-eta">${m.state === 'active' ? '← NOW' : m.state === 'done' ? '✓' : `W+${m.weeks}`}</div>
        </div>
      `).join('')}
    </div>

    <div class="tasks-section">
      <div class="tasks-header">ACTIVE TASKS</div>
      ${activeTasks.length > 0
        ? activeTasks.map(t => `
          <div class="task-item">
            <span class="task-pill ${t.pillCls}">${t.pill}</span>
            <span class="task-name">${t.name}</span>
          </div>
        `).join('')
        : '<div class="no-tasks">NO ACTIVE TASKS — add cards to "This Week" or "In Progress"</div>'
      }
    </div>
  </div>`;
}

// ─── SCHEDULE ─────────────────────────────────────────────────────────────────
function renderSchedule(allData) {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const mondayOffset = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + mondayOffset);

  // Flatten all active tasks across projects
  const pool = [];
  ['mz', 'pu', 'tr'].forEach(k => {
    if (!allData[k]) return;
    const c = allData[k];
    [...c.progress, ...c.week].forEach(t => pool.push({ name: t.name, cls: k }));
  });

  // Distribute round-robin across Mon–Sun
  const schedule = DAYS.map((d, i) => {
    const date = new Date(monday);
    date.setDate(monday.getDate() + i);
    return { day: d, date, tasks: [] };
  });

  pool.forEach((t, i) => {
    const dayIdx = i % 7;
    schedule[dayIdx].tasks.push(t);
  });

  // If pool is empty, add placeholder
  if (pool.length === 0) {
    schedule[0].tasks.push({ name: 'No active tasks. Move cards to "This Week" or "In Progress"', cls: 'mz' });
  }

  const todayIdx = day === 0 ? 6 : day - 1; // Mon=0 ... Sun=6

  const weekStart = monday.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' });
  const weekEnd = schedule[6].date.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' });
  document.getElementById('weekLabel').textContent = `${weekStart} – ${weekEnd}`;

  document.getElementById('scheduleGrid').innerHTML = schedule.map((d, i) => `
    <div class="day-col">
      <div class="day-label ${i === todayIdx ? 'today' : ''}">${d.day} ${i === todayIdx ? '← TODAY' : d.date.getDate()}</div>
      ${d.tasks.map(t => `
        <div class="schedule-task ${t.cls}">
          <div class="proj-tag">${PROJECT_META[t.cls].name}</div>
          ${t.name}
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ─── ANALYST NOTES ────────────────────────────────────────────────────────────
function renderAnalyst(allData) {
  const notes = [];
  const keys = ['mz', 'pu', 'tr'];

  let totalBlocked = 0, totalActive = 0, emptyBoards = [];

  keys.forEach(k => {
    if (!allData[k]) return;
    const c = allData[k];
    const name = PROJECT_META[k].name;
    const total = Object.values(c).flat().length;
    const done = c.done.length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;

    totalBlocked += c.blocked.length;
    totalActive += c.progress.length + c.week.length;

    if (total === 0) emptyBoards.push(name);
    if (c.blocked.length > 0) {
      notes.push({ type: 'alert', icon: '🔴', text: `${name}: ${c.blocked.length} blocked task${c.blocked.length > 1 ? 's' : ''}. Unblock before adding more. What's the blocker?` });
    }
    if (c.progress.length === 0 && c.week.length === 0 && total > 0) {
      notes.push({ type: 'warn', icon: '⚠️', text: `${name}: Nothing active. Move tasks to "In Progress" or "This Week" — you need a working lane.` });
    }
    if (pct === 100 && total > 0) {
      notes.push({ type: 'good', icon: '✅', text: `${name}: Board cleared. Add your next sprint of tasks.` });
    }
    if (c.backlog.length > 15) {
      notes.push({ type: 'warn', icon: '📋', text: `${name}: ${c.backlog.length} tasks in backlog. Prioritise ruthlessly — backlog rot is a focus killer.` });
    }
  });

  if (emptyBoards.length > 0) {
    notes.push({ type: 'warn', icon: '📌', text: `${emptyBoards.join(', ')}: No tasks yet. Populate these boards — you can't track what isn't logged.` });
  }
  if (totalBlocked === 0 && totalActive > 0) {
    notes.push({ type: 'good', icon: '🟢', text: `Zero blockers across all 3 projects. Clean lanes — keep the momentum.` });
  }
  if (totalActive === 0) {
    notes.push({ type: 'alert', icon: '🔴', text: `Nothing is marked "In Progress" or "This Week" across any project. You are not executing — fix this now.` });
  }
  notes.push({ type: 'info', icon: '📍', text: `3 ventures simultaneously. Protect deep work blocks. Don't context-switch mid-task — finish before flipping project.` });

  document.getElementById('analystBody').innerHTML = notes.map(n => `
    <div class="analyst-line ${n.type}">
      <span class="analyst-icon">${n.icon}</span>
      <span>${n.text}</span>
    </div>
  `).join('');
}

// ─── STATS BAR ────────────────────────────────────────────────────────────────
function renderStats(allData) {
  let total = 0, done = 0, active = 0, blocked = 0;
  Object.values(allData).forEach(c => {
    if (!c) return;
    total += Object.values(c).flat().length;
    done += c.done.length;
    active += c.progress.length + c.week.length;
    blocked += c.blocked.length;
  });
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-blocked').textContent = blocked;
  document.getElementById('stat-pct').textContent = pct + '%';
}

// ─── MAIN LOAD ────────────────────────────────────────────────────────────────
async function loadAll() {
  if (!getKey() || !getToken()) {
    document.getElementById('configBanner').classList.add('show');
    return;
  }
  document.getElementById('configBanner').classList.remove('show');
  hideError();

  const btn = document.getElementById('syncBtn');
  btn.classList.add('spinning');

  const allData = {};

  try {
    const results = await Promise.allSettled([
      fetchBoard(BOARD_IDS.mz),
      fetchBoard(BOARD_IDS.pu),
      fetchBoard(BOARD_IDS.tr),
    ]);

    const keys = ['mz', 'pu', 'tr'];
    const errors = [];

    results.forEach((res, i) => {
      const k = keys[i];
      if (res.status === 'fulfilled') {
        allData[k] = classifyCards(res.value.cards, res.value.lists);
      } else {
        errors.push(`${PROJECT_META[k].name}: ${res.reason.message}`);
        allData[k] = null;
      }
    });

    if (errors.length > 0) showError(errors.join(' | '));

    // Render project cards
    document.getElementById('projectsGrid').innerHTML = keys.map(k =>
      allData[k]
        ? renderProjectCard(k, null, allData[k])
        : `<div class="project-card ${PROJECT_META[k].cls}">
             <div class="project-header">
               <div class="project-name">${PROJECT_META[k].name}</div>
             </div>
             <div class="tasks-section"><div class="no-tasks">FAILED TO LOAD — check API credentials</div></div>
           </div>`
    ).join('');

    renderStats(allData);
    renderSchedule(allData);
    renderAnalyst(allData);

    const now = new Date();
    document.getElementById('syncTime').textContent = `SYNCED ${now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' })}`;
    document.getElementById('footerDate').textContent = now.toLocaleDateString('en-ZA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  } catch (err) {
    showError('Fatal: ' + err.message);
  } finally {
    btn.classList.remove('spinning');
  }
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorBanner').classList.remove('show');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('footerDate').textContent = new Date().toLocaleDateString('en-ZA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  if (getKey() && getToken()) {
    document.getElementById('configBanner').classList.remove('show');
    loadAll();
  } else {
    document.getElementById('configBanner').classList.add('show');
    // Pre-fill if stored
    document.getElementById('inputKey').value = getKey();
    document.getElementById('inputToken').value = getToken();
  }
});
</script>
