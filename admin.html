<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MzansiAcademy — Admin</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23080D1A'/><text x='16' y='23' font-size='18' text-anchor='middle'>🛡️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc, query, orderBy, limit, where, serverTimestamp, onSnapshot, addDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey:"AIzaSyCS6LZeWX0qmi3O1BN9dD4u8yGVu9N0Fi8",
  authDomain:"edusa-a6efe.firebaseapp.com",
  projectId:"edusa-a6efe",
  storageBucket:"edusa-a6efe.firebasestorage.app",
  messagingSenderId:"104983276558",
  appId:"1:104983276558:web:3a5bf7016666d3e873a2e0",
  measurementId:"G-N8W3TQ8QVD"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth= getAuth(app);
const rtdb= getDatabase(app);

window.ADMIN_FB = { db, auth, rtdb, collection, getDocs, doc, getDoc, updateDoc, deleteDoc, query, orderBy, limit, where, serverTimestamp, onSnapshot, addDoc, setDoc, ref, onValue };

onAuthStateChanged(auth, async (user) => {
  document.getElementById('adminLoader').style.display = 'none';
  if (!user) { window.location.href = 'index.html'; return; }
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists() || !snap.data().isAdmin) {
      document.getElementById('accessDenied').style.display = 'flex';
      return;
    }
    window.adminUser = { ...snap.data(), uid: user.uid, email: user.email };
    document.getElementById('adminShell').style.display = 'flex';
    document.getElementById('adminEmail').textContent = user.email;
    if (typeof initAdminDashboard === 'function') initAdminDashboard();
  } catch(e) {
    document.getElementById('accessDenied').style.display = 'flex';
  }
});
</script>

<style>
:root{
  --bg:#080D1A;--bg1:#0D1424;--bg2:#111B2E;--bg3:#162038;--bg4:#1E2D47;
  --green:#00D68F;--teal:#00C2D4;--gold:#FFB800;--red:#EF4444;--purple:#A855F7;--blue:#3B9EFF;--orange:#FF6B35;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --txt:#F0F4FF;--txt2:#A8B8D8;--txt3:#5A7099;--txt4:#2E4066;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --sidebar:220px;--topbar:56px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--txt);overflow:hidden;}
@media(max-width:768px){html,body{overflow:auto;}}

#adminLoader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;font-size:.9rem;color:var(--txt3);}
#accessDenied{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:1rem;text-align:center;padding:2rem;z-index:9999;}
#adminShell{display:none;height:100vh;flex-direction:row;}

.sidebar{width:var(--sidebar);background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sidebar-brand{padding:1rem 1.1rem .875rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-logo{font-family:'Fraunces',serif;font-size:1rem;font-weight:900;color:var(--txt);margin-bottom:2px;}
.sidebar-logo span{color:var(--green);}
.sidebar-sub{font-size:.6rem;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.1em;}
.sidebar-nav{flex:1;padding:.625rem 0;}
.nav-item{display:flex;align-items:center;gap:.625rem;padding:.55rem 1.1rem;font-size:.78rem;font-weight:600;color:var(--txt3);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{color:var(--txt);background:var(--bg2);}
.nav-item.active{color:var(--green);background:rgba(0,214,143,.07);border-left-color:var(--green);}
.sidebar-section{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--txt4);padding:.875rem 1.1rem .25rem;}
.sidebar-footer{padding:.875rem 1.1rem;border-top:1px solid var(--border);flex-shrink:0;}
.admin-email{font-size:.65rem;color:var(--txt3);margin-bottom:.5rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:var(--topbar);background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.25rem;gap:.75rem;flex-shrink:0;}
.topbar-title{font-family:'Fraunces',serif;font-size:.92rem;font-weight:800;color:var(--txt);flex:1;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}
.content{flex:1;overflow-y:auto;padding:1.25rem;}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.1rem;}
.card-title{font-size:.75rem;font-weight:800;color:var(--txt);margin-bottom:.875rem;display:flex;align-items:center;gap:.5rem;justify-content:space-between;}
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.625rem;margin-bottom:1.25rem;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:.875rem;text-align:center;}
.stat-val{font-family:var(--mono);font-size:1.4rem;font-weight:800;margin-bottom:2px;}
.stat-lbl{font-size:.62rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;}

.data-table{width:100%;border-collapse:collapse;font-size:.75rem;}
.data-table th{text-align:left;padding:.5rem .75rem;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txt3);border-bottom:1px solid var(--border);white-space:nowrap;}
.data-table td{padding:.5rem .75rem;border-bottom:1px solid rgba(255,255,255,.035);color:var(--txt2);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(255,255,255,.02);}
.data-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);background:var(--bg2);}

.badge{display:inline-flex;align-items:center;gap:.25rem;padding:2px 8px;border-radius:20px;font-size:.62rem;font-weight:700;}
.badge-green{background:rgba(0,214,143,.12);color:var(--green);border:1px solid rgba(0,214,143,.25);}
.badge-gold{background:rgba(255,184,0,.12);color:var(--gold);border:1px solid rgba(255,184,0,.25);}
.badge-red{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.badge-teal{background:rgba(0,194,212,.12);color:var(--teal);border:1px solid rgba(0,194,212,.25);}
.badge-purple{background:rgba(168,85,247,.12);color:var(--purple);border:1px solid rgba(168,85,247,.25);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;font-family:var(--font);font-weight:700;cursor:pointer;border:none;border-radius:8px;transition:all .18s;font-size:.78rem;padding:.45rem 1rem;}
.btn:hover{transform:translateY(-1px);}
.btn-green{background:linear-gradient(135deg,var(--green),var(--teal));color:#000;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--txt2);}
.btn-ghost:hover{border-color:var(--green);color:var(--green);}
.btn-red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--red);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;}
.btn-sm{padding:.3rem .7rem;font-size:.7rem;}

.form-group{margin-bottom:.875rem;}
.form-label{display:block;font-size:.7rem;font-weight:700;color:var(--txt2);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.05em;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;padding:.55rem .875rem;font-family:var(--font);font-size:.8rem;color:var(--txt);outline:none;transition:border-color .18s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--green);}
.form-textarea{resize:vertical;min-height:80px;}
.form-select option{background:var(--bg3);}

.prog-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .4s;}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:.625rem 1.1rem;font-size:.8rem;font-weight:600;color:var(--txt);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;opacity:0;pointer-events:none;transition:all .3s;max-width:340px;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-center{display:flex;justify-content:center;padding:2rem;}

@media(max-width:768px){
  #adminShell{flex-direction:column;height:auto;}
  .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:.5rem;gap:.25rem;border-right:none;border-bottom:1px solid var(--border);}
  .sidebar-brand,.sidebar-section,.sidebar-footer,.admin-email{display:none;}
  .sidebar-nav{display:flex;flex-wrap:wrap;gap:.25rem;padding:0;}
  .nav-item{padding:.35rem .625rem;border-left:none;border-radius:8px;font-size:.65rem;}
  .nav-item.active{border-left:none;background:rgba(0,214,143,.12);}
  .main-area{min-height:0;}
  .content{overflow-y:visible;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div id="adminLoader">🛡️ &nbsp;Verifying admin access...</div>

<div id="accessDenied">
  <div style="font-size:3rem">🚫</div>
  <h2 style="font-family:'Fraunces',serif;color:var(--red)">Access Denied</h2>
  <p style="color:var(--txt3);font-size:.85rem;max-width:300px">Your account does not have admin privileges.<br>Ask Thabiso to set <code>isAdmin: true</code> in Firestore.</p>
  <a href="index.html" style="color:var(--green);font-size:.85rem;margin-top:.5rem">← Back to MzansiAcademy</a>
</div>

<div id="adminShell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">Mzansi<span>Academy</span></div>
      <div class="sidebar-sub">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Overview</div>
      <button class="nav-item active" onclick="showSection('dashboard',this)">📊 Dashboard</button>
      <button class="nav-item" onclick="showSection('learners',this)">👥 Learners</button>
      <button class="nav-item" onclick="showSection('leaderboard',this)">🏆 Leaderboard</button>
      <button class="nav-item" onclick="showSection('competitions',this)">⚔️ Competitions</button>
      <div class="sidebar-section">Content</div>
      <button class="nav-item" onclick="showSection('announcements',this)">📢 Announcements</button>
      <button class="nav-item" onclick="showSection('partnerships',this)">💼 Partnerships</button>
      <div class="sidebar-section">Tools</div>
      <button class="nav-item" onclick="showSection('export',this)">📥 Export Data</button>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-email" id="adminEmail">—</div>
      <button class="btn btn-ghost btn-sm" style="width:100%" onclick="handleSignOut()">🚪 Sign Out</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <span style="display:flex;align-items:center;gap:.375rem;font-size:.65rem;font-weight:700;color:var(--green)"><span class="live-dot"></span> Live</span>
      <button class="btn btn-ghost btn-sm" onclick="refreshCurrentSection()">↻ Refresh</button>
      <a href="index.html" target="_blank" class="btn btn-ghost btn-sm">🌐 Site</a>
    </div>
    <div class="content" id="mainContent">
      <div class="loading-center"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Toast ─────────────────────────────────────────────────────
function showToast(msg,type){
  var t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg;
  t.className='toast show';
  t.style.borderColor=type==='error'?'rgba(239,68,68,.4)':type==='success'?'rgba(0,214,143,.4)':'rgba(255,255,255,.12)';
  clearTimeout(t._t);
  t._t=setTimeout(function(){t.classList.remove('show');},3200);
}

function handleSignOut(){
  if(window.ADMIN_FB) window.ADMIN_FB.auth.signOut().then(function(){window.location.href='index.html';});
}

// ── Section router ────────────────────────────────────────────
var _cur='dashboard';
function showSection(id,btn){
  _cur=id;
  document.querySelectorAll('.nav-item').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  var titles={dashboard:'📊 Dashboard',learners:'👥 Learners',leaderboard:'🏆 Leaderboard',competitions:'⚔️ Competitions',announcements:'📢 Announcements',partnerships:'💼 Partnership Inquiries',export:'📥 Export Data'};
  document.getElementById('topbarTitle').textContent=titles[id]||id;
  window.scrollTo(0,0);
  ({dashboard:renderDashboard,learners:renderLearners,leaderboard:renderLeaderboard,competitions:renderCompetitions,announcements:renderAnnouncements,partnerships:renderPartnerships,export:renderExport}[id]||function(){})();
}
function refreshCurrentSection(){showSection(_cur,document.querySelector('.nav-item.active'));}

// ── Firebase wait ─────────────────────────────────────────────
var FB=null;
function waitForFB(cb,n){
  n=n||0;
  if(window.ADMIN_FB&&window.ADMIN_FB.db){FB=window.ADMIN_FB;cb();}
  else if(n<40) setTimeout(function(){waitForFB(cb,n+1);},200);
}

function setContent(html){document.getElementById('mainContent').innerHTML=html;}
function fmt(n){return typeof n==='number'?n.toLocaleString():n||'—';}
function fmtDate(ts){
  if(!ts) return '—';
  try{var d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'});}catch(e){return '—';}
}

// ═══════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════
async function renderDashboard(){
  setContent('<div class="loading-center"><div class="spinner"></div></div>');
  try{
    var [usersSnap,lbSnap,annSnap,partSnap]=await Promise.all([
      FB.getDocs(FB.query(FB.collection(FB.db,'users'),FB.limit(500))),
      FB.getDocs(FB.query(FB.collection(FB.db,'leaderboard'),FB.orderBy('pts','desc'),FB.limit(10))),
      FB.getDocs(FB.query(FB.collection(FB.db,'announcements'),FB.orderBy('createdAt','desc'),FB.limit(5))),
      FB.getDocs(FB.query(FB.collection(FB.db,'partnershipInquiries'),FB.orderBy('submittedAt','desc'),FB.limit(5))).catch(function(){return {docs:[]};})
    ]);
    var users=usersSnap.docs.map(function(d){return Object.assign({uid:d.id},d.data());});
    var totalPts=users.reduce(function(a,u){return a+(u.pts||0);},0);
    var totalQuizzes=users.reduce(function(a,u){return a+(u.totalQuizzes||0);},0);
    var totalWins=users.reduce(function(a,u){return a+(u.battleWins||0);},0);
    var provinces={};
    users.forEach(function(u){if(u.province)provinces[u.province]=(provinces[u.province]||0)+1;});
    var topProv=Object.entries(provinces).sort(function(a,b){return b[1]-a[1];})[0];
    var grades={};
    users.forEach(function(u){if(u.grade)grades['Grade '+u.grade]=(grades['Grade '+u.grade]||0)+1;});

    var medals=['🥇','🥈','🥉'];
    var lbRows=lbSnap.docs.slice(0,5).map(function(d,i){
      var r=d.data();
      return '<tr><td style="font-weight:800;color:var(--gold)">'+(i<3?medals[i]:'#'+(i+1))+'</td>'
        +'<td style="font-weight:700;color:var(--txt)">'+(r.displayName||'—')+'</td>'
        +'<td>'+(r.grade?'Gr '+r.grade:'—')+'</td>'
        +'<td>'+(r.province||'—')+'</td>'
        +'<td style="font-family:var(--mono);color:var(--gold);font-weight:700">'+fmt(r.pts||0)+'</td></tr>';
    }).join('');

    var gradeBreakdown=Object.entries(grades).sort().map(function(g){
      var pct=users.length?Math.round(g[1]/users.length*100):0;
      return '<div style="margin-bottom:.5rem"><div style="display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:3px"><span style="color:var(--txt2)">'+g[0]+'</span><span style="color:var(--green);font-family:var(--mono)">'+g[1]+' ('+pct+'%)</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:var(--green)"></div></div></div>';
    }).join('');

    var recentAnns=annSnap.docs.map(function(d){
      var a=d.data();
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">'
        +'<div><div style="font-size:.78rem;font-weight:700;color:var(--txt)">'+a.title+'</div>'
        +'<div style="font-size:.65rem;color:var(--txt3)">'+fmtDate(a.createdAt)+'</div></div>'
        +'<span class="badge '+(a.type==='event'?'badge-gold':a.type==='alert'?'badge-red':'badge-teal')+'">'+a.type+'</span></div>';
    }).join('')||'<div style="font-size:.75rem;color:var(--txt3);padding:.5rem 0">No announcements yet</div>';

    var partRows=partSnap.docs.map(function(d){
      var p=d.data();
      return '<div style="padding:.5rem 0;border-bottom:1px solid var(--border)">'
        +'<div style="font-size:.78rem;font-weight:700;color:var(--txt)">'+p.name+(p.organisation?' · '+p.organisation:'')+'</div>'
        +'<div style="font-size:.65rem;color:var(--txt3)">'+p.email+' · '+fmtDate(p.submittedAt)+'</div></div>';
    }).join('')||'<div style="font-size:.75rem;color:var(--txt3);padding:.5rem 0">No inquiries yet</div>';

    setContent(
      '<div class="stat-row">'
      +'<div class="stat-card"><div class="stat-val" style="color:var(--green)">'+fmt(users.length)+'</div><div class="stat-lbl">Learners</div></div>'
      +'<div class="stat-card"><div class="stat-val" style="color:var(--gold)">'+fmt(totalPts)+'</div><div class="stat-lbl">Total Points</div></div>'
      +'<div class="stat-card"><div class="stat-val" style="color:var(--teal)">'+fmt(totalQuizzes)+'</div><div class="stat-lbl">Quizzes Done</div></div>'
      +'<div class="stat-card"><div class="stat-val" style="color:var(--purple)">'+fmt(totalWins)+'</div><div class="stat-lbl">Battle Wins</div></div>'
      +'<div class="stat-card"><div class="stat-val" style="color:var(--orange)">'+(topProv?topProv[0].split(' ')[0]:'—')+'</div><div class="stat-lbl">Top Province</div></div>'
      +'</div>'

      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">'
      +'<div class="card"><div class="card-title">🏆 Top 5 Learners</div>'
      +'<div class="data-table-wrap"><table class="data-table"><thead><tr><th>Rank</th><th>Name</th><th>Grade</th><th>Province</th><th>Points</th></tr></thead>'
      +'<tbody>'+lbRows+'</tbody></table></div></div>'
      +'<div class="card"><div class="card-title">🎓 Grade Breakdown</div>'+gradeBreakdown+'</div>'
      +'</div>'

      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">'
      +'<div class="card"><div class="card-title">📢 Recent Announcements <button class="btn btn-green btn-sm" onclick="showSection(\'announcements\',document.querySelectorAll(\'.nav-item\')[5])">Manage</button></div>'+recentAnns+'</div>'
      +'<div class="card"><div class="card-title">💼 Latest Inquiries <button class="btn btn-ghost btn-sm" onclick="showSection(\'partnerships\',document.querySelectorAll(\'.nav-item\')[6])">View All</button></div>'+partRows+'</div>'
      +'</div>'
    );
  }catch(e){setContent('<div style="padding:2rem;color:var(--red)">Error loading dashboard: '+e.message+'</div>');}
}

// ═══════════════════════════════════════════════════════════════
// LEARNERS
// ═══════════════════════════════════════════════════════════════
var _allLearners=[], _lFilter='';
async function renderLearners(){
  setContent('<div class="loading-center"><div class="spinner"></div></div>');
  try{
    var snap=await FB.getDocs(FB.query(FB.collection(FB.db,'users'),FB.orderBy('pts','desc'),FB.limit(300)));
    _allLearners=snap.docs.map(function(d){return Object.assign({uid:d.id},d.data());});
    _lFilter='';
    renderLearnersTable();
  }catch(e){setContent('<div style="padding:2rem;color:var(--red)">Error: '+e.message+'</div>');}
}

function renderLearnersTable(){
  var data=_allLearners.filter(function(u){
    if(!_lFilter) return true;
    var q=_lFilter.toLowerCase();
    return (u.displayName||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q)||(u.province||'').toLowerCase().includes(q)||String(u.grade||'').includes(q);
  });

  var rows=data.map(function(u,i){
    var pts=u.pts||0;
    var rankLabel=pts>=10000?'👑 Ezinye':pts>=5000?'🧠 Clever':pts>=2000?'⚡ Skhokho':pts>=500?'📖 Lekker':'😤 Rookie';
    var safeUid=u.uid.replace(/'/g,"\\'");
    return '<tr>'
      +'<td style="font-family:var(--mono);color:var(--txt3);font-size:.68rem">'+(i+1)+'</td>'
      +'<td><div style="font-weight:700;color:var(--txt);font-size:.78rem">'+(u.displayName||'—')+'</div><div style="font-size:.62rem;color:var(--txt3)">'+(u.email||'—')+'</div></td>'
      +'<td>'+(u.grade?'Gr '+u.grade:'—')+'</td>'
      +'<td>'+(u.province||'—')+'</td>'
      +'<td style="font-family:var(--mono);color:var(--gold);font-weight:700">'+fmt(pts)+'</td>'
      +'<td style="font-family:var(--mono);color:var(--teal)">'+(u.totalQuizzes||0)+'</td>'
      +'<td style="font-family:var(--mono);color:var(--purple)">'+(u.battleWins||0)+'</td>'
      +'<td style="font-family:var(--mono);color:var(--green)">'+(u.streakDays||0)+'d</td>'
      +'<td><span class="badge badge-green" style="font-size:.58rem">'+rankLabel+'</span></td>'
      +'<td style="font-size:.65rem;color:var(--txt3)">'+(u.lastActive?fmtDate(u.lastActive):'—')+'</td>'
      +'<td><button class="btn btn-ghost btn-sm" onclick="viewLearnerDetail(\''+safeUid+'\')">View</button></td>'
      +'</tr>';
  }).join('');

  setContent(
    '<div style="display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center">'
    +'<input class="form-input" placeholder="🔍 Search by name, email, province, grade..." oninput="_lFilter=this.value;renderLearnersTable()" style="flex:1;min-width:200px;font-size:.8rem">'
    +'<button class="btn btn-gold btn-sm" onclick="exportLearners()">📥 Export CSV</button>'
    +'<button class="btn btn-ghost btn-sm" onclick="exportLearnersJSON()">📄 JSON</button>'
    +'</div>'
    +'<div style="font-size:.72rem;color:var(--txt3);margin-bottom:.75rem">Showing '+data.length+' of '+_allLearners.length+' learners (sorted by points)</div>'
    +'<div class="data-table-wrap"><table class="data-table">'
    +'<thead><tr><th>#</th><th>Name / Email</th><th>Grade</th><th>Province</th><th>Points</th><th>Quizzes</th><th>Wins</th><th>Streak</th><th>Rank</th><th>Last Active</th><th></th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>'
  );
}

function viewLearnerDetail(uid){

async function announceWinners(){
  try{
    var snap=await FB.getDocs(FB.query(FB.collection(FB.db,'leaderboard'),FB.orderBy('pts','desc'),FB.limit(3)));
    var top=snap.docs.map(function(d){return d.data();});
    if(!top.length){showToast('No leaderboard data','error');return;}
    var msg='🥇 '+top[0].displayName+' — '+fmt(top[0].pts||0)+' pts'
      +(top[1]?'\n🥈 '+top[1].displayName+' — '+fmt(top[1].pts||0)+' pts':'')
      +(top[2]?'\n🥉 '+top[2].displayName+' — '+fmt(top[2].pts||0)+' pts':'');
    await FB.addDoc(FB.collection(FB.db,'announcements'),{
      title:'🏆 Competition Winners Announced!',
      message:msg,
      type:'event',
      target:'all',
      createdAt:FB.serverTimestamp(),
      createdBy:(window.adminUser&&window.adminUser.email)||'admin'
    });
    showToast('Winners announced to all learners! 🏆','success');
  }catch(e){showToast('Error: '+e.message,'error');}
}

  }catch(e){setContent('<div style="padding:2rem;color:var(--red)">Error: '+e.message+'</div>');}

async function postAnnouncement(){
  var title=(document.getElementById('annTitle').value||'').trim();
  var msg=(document.getElementById('annMsg').value||'').trim();
  var type=document.getElementById('annType').value;
  var target=document.getElementById('annTarget').value;
  if(!title||!msg){showToast('Title and message required','error');return;}
  try{
    await FB.addDoc(FB.collection(FB.db,'announcements'),{title,message:msg,type,target,createdAt:FB.serverTimestamp(),createdBy:(window.adminUser&&window.adminUser.email)||'admin'});
    showToast('Announcement posted! 📢','success');
    renderAnnouncements();
  }catch(e){showToast('Error: '+e.message,'error');}
}

async function deleteAnn(id){
  if(!confirm('Delete this announcement?')) return;
  try{await FB.deleteDoc(FB.doc(FB.db,'announcements',id));showToast('Deleted','info');renderAnnouncements();}
  catch(e){showToast('Error: '+e.message,'error');}
}

// ── CSV/JSON helpers ─────────────────────────────────────────
function dlCSV(name,headers,rows){
  var csv=[headers.map(function(h){return '"'+h+'"';}).join(',')].concat(rows.map(function(r){return r.map(function(c){return '"'+String(c==null?'':c).replace(/"/g,'""')+'"';}).join(',');})).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=name; a.click();
  showToast('Downloaded: '+name,'success');
}
function dlJSON(name,data){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=name; a.click();
  showToast('Downloaded: '+name,'success');
}
